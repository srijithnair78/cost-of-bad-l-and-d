<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Cost of Bad L&D</title>

<style>
body{
background:#111;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:monospace;
}

canvas{
box-shadow:0 10px 40px rgba(0,0,0,0.5);
border-radius:4px;
}
</style>

</head>

<body>

<canvas id="receiptCanvas" width="512" height="1024"></canvas>

<script>

const canvas = document.getElementById("receiptCanvas");
const ctx = canvas.getContext("2d");

/* --- Receipt Paper Background --- */

ctx.fillStyle = "#fdfdfd";
ctx.fillRect(0,0,canvas.width,canvas.height);

/* --- Title --- */

ctx.fillStyle="#111";
ctx.textAlign="center";
ctx.font="bold 32px monospace";
ctx.fillText("THE COST OF BAD L&D",256,80);


/* --- Receipt Items --- */

ctx.textAlign="left";

const items = [
{ name:"Talent Disengaged", cost:"$82,000"},
{ name:"Skills Not Applied", cost:"$41,000"},
{ name:"Leadership Stalled", cost:"$36,000"},
{ name:"Wrong Learners", cost:"$29,000"}
];

items.forEach((item,i)=>{

let y = 180 + (i*100);

ctx.font="bold 20px monospace";
ctx.fillText(item.name,40,y);

ctx.textAlign="right";
ctx.fillText(item.cost,470,y);

ctx.textAlign="left";
ctx.font="14px monospace";
ctx.fillText("Investment without impact.",40,y+25);

});

/* --- Total --- */

ctx.font="bold 28px monospace";
ctx.fillText("TOTAL: $300,000.00",40,850);

</script>

</body>
</html>
